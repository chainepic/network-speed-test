<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Speed test and guardrails preview</title>
  <desc id="desc">A stylized preview of speed test metrics and local quota guardrails.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1440" height="900" rx="42" fill="url(#bg)"/>
  <text x="96" y="116" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800">Speed Test & Guardrails</text>
  <text x="96" y="158" fill="#ccfbf1" font-family="Inter, Arial, sans-serif" font-size="20">Download, upload, latency, jitter, and local quota demos for high-traffic testing.</text>
  <g filter="url(#shadow)" transform="translate(96 218)">
    <rect width="1248" height="548" rx="34" fill="url(#card)"/>
    <g transform="translate(48 52)">
      <rect width="520" height="210" rx="26" fill="#0f172a"/>
      <text x="32" y="48" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Latest result</text>
      <text x="32" y="118" fill="#38bdf8" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="900">286.4</text>
      <text x="226" y="114" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Mbps down</text>
      <text x="32" y="164" fill="#22c55e" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">42.8 Mbps up</text>
      <text x="312" y="164" fill="#fbbf24" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">19 ms</text>
    </g>
    <g transform="translate(616 52)" font-family="Inter, Arial, sans-serif">
      <rect width="536" height="210" rx="26" fill="#ecfeff" stroke="#bae6fd"/>
      <text x="30" y="48" fill="#0f172a" font-size="24" font-weight="800">Test profiles</text>
      <rect x="30" y="76" width="146" height="92" rx="18" fill="#ffffff" stroke="#dbeafe"/>
      <text x="50" y="112" fill="#0f172a" font-size="18" font-weight="800">Standard</text>
      <text x="50" y="142" fill="#64748b" font-size="15">100 MB down</text>
      <rect x="196" y="76" width="146" height="92" rx="18" fill="#ffffff" stroke="#dbeafe"/>
      <text x="216" y="112" fill="#0f172a" font-size="18" font-weight="800">Extreme</text>
      <text x="216" y="142" fill="#64748b" font-size="15">250 MB down</text>
      <rect x="362" y="76" width="146" height="92" rx="18" fill="#ffffff" stroke="#dbeafe"/>
      <text x="382" y="112" fill="#0f172a" font-size="18" font-weight="800">Latency</text>
      <text x="382" y="142" fill="#64748b" font-size="15">HTTP probes</text>
    </g>
    <g transform="translate(48 310)" font-family="Inter, Arial, sans-serif">
      <rect width="344" height="172" rx="24" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="26" y="42" fill="#0f172a" font-size="22" font-weight="800">Local quota demo</text>
      <text x="26" y="84" fill="#334155" font-size="17">Balance: 6 points</text>
      <text x="26" y="118" fill="#334155" font-size="17">Daily cap: 20 standard tests</text>
      <text x="26" y="150" fill="#16a34a" font-size="16" font-weight="800">Refunds on failed tests</text>
      <rect x="416" width="344" height="172" rx="24" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="442" y="42" fill="#0f172a" font-size="22" font-weight="800">Endpoint notes</text>
      <text x="442" y="84" fill="#334155" font-size="17">Cloudflare public edge</text>
      <text x="442" y="118" fill="#334155" font-size="17">httpbin upload fallback</text>
      <text x="442" y="150" fill="#0284c7" font-size="16" font-weight="800">Replace with own nodes</text>
      <rect x="832" width="320" height="172" rx="24" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="858" y="42" fill="#0f172a" font-size="22" font-weight="800">Open source use</text>
      <text x="858" y="84" fill="#334155" font-size="17">Learn SwiftUI networking</text>
      <text x="858" y="118" fill="#334155" font-size="17">Troubleshoot routing</text>
      <text x="858" y="150" fill="#0d9488" font-size="16" font-weight="800">MIT licensed</text>
    </g>
  </g>
</svg>
