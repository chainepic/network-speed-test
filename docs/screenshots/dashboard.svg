<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Network Speed Test dashboard preview</title>
  <desc id="desc">A stylized preview of the Network Speed Test overview dashboard.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1440" height="900" rx="42" fill="url(#bg)"/>
  <circle cx="1190" cy="120" r="220" fill="#38bdf8" opacity="0.12"/>
  <circle cx="180" cy="820" r="260" fill="#22c55e" opacity="0.10"/>
  <g filter="url(#shadow)">
    <rect x="90" y="84" width="1260" height="732" rx="32" fill="#f8fafc"/>
    <rect x="90" y="84" width="1260" height="76" rx="32" fill="#e2e8f0"/>
    <circle cx="126" cy="122" r="10" fill="#ef4444"/>
    <circle cx="158" cy="122" r="10" fill="#f59e0b"/>
    <circle cx="190" cy="122" r="10" fill="#22c55e"/>
    <text x="236" y="130" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Network Speed Test</text>
    <g transform="translate(126 204)">
      <rect width="570" height="176" rx="24" fill="#0f172a"/>
      <text x="32" y="48" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">Network looks healthy</text>
      <text x="32" y="84" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="18">Download, upload, latency, DNS and VPN hints are summarized in one place.</text>
      <rect x="32" y="116" width="190" height="38" rx="19" fill="url(#accent)"/>
      <text x="56" y="141" fill="#052e16" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Start diagnosis</text>
    </g>
    <g transform="translate(730 204)">
      <rect width="484" height="176" rx="24" fill="#e0f2fe"/>
      <text x="30" y="48" fill="#075985" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Speed snapshot</text>
      <text x="30" y="96" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="800">286 Mbps</text>
      <text x="300" y="96" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="800">19 ms</text>
      <text x="32" y="130" fill="#0369a1" font-family="Inter, Arial, sans-serif" font-size="16">Download</text>
      <text x="304" y="130" fill="#0369a1" font-family="Inter, Arial, sans-serif" font-size="16">Latency</text>
    </g>
    <g transform="translate(126 420)">
      <rect width="356" height="250" rx="24" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="28" y="44" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Public IP</text>
      <text x="28" y="92" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="18">203.0.113.42</text>
      <text x="28" y="134" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="16">ISP: Example Fiber</text>
      <text x="28" y="170" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="16">Region: Singapore</text>
      <text x="28" y="206" fill="#22c55e" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Reachable</text>
    </g>
    <g transform="translate(514 420)">
      <rect width="356" height="250" rx="24" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="28" y="44" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Network path</text>
      <text x="28" y="92" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="18">Interface: Wi-Fi</text>
      <text x="28" y="134" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="16">IPv4 / IPv6 available</text>
      <text x="28" y="170" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="16">DNS reachable</text>
      <text x="28" y="206" fill="#f59e0b" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">VPN hint detected</text>
    </g>
    <g transform="translate(902 420)">
      <rect width="312" height="250" rx="24" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="28" y="44" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Progress</text>
      <rect x="28" y="82" width="256" height="12" rx="6" fill="#dcfce7"/>
      <rect x="28" y="82" width="210" height="12" rx="6" fill="#22c55e"/>
      <text x="28" y="132" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="16">IP lookup completed</text>
      <text x="28" y="168" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="16">Speed test completed</text>
      <text x="28" y="204" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="16">Generating summary</text>
    </g>
  </g>
</svg>
